name: Deploy to EC2

on:
  push:
    branches:
      - main  # Set this to your production branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USER }}/globxpoler  # Adjust this path to your app location
            git pull origin main
            npm install
            # Restart the app with PM2
            pm2 restart all || pm2 start src/server.js --name "globx-crm"
            pm2 save
