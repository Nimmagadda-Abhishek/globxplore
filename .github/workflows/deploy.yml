name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_DIR: /home/ubuntu/globxplore
  APP_NAME: globx-crm
  NODE_VERSION: '18'

jobs:
  # ─── Job 1: Build & Test ───────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: |
          if grep -q '"test"' package.json && ! grep -q 'no test specified' package.json; then
            npm test
          else
            echo "⚠️ No test suite found, skipping..."
          fi

      - name: Run Lint
        run: npm run lint --if-present

  # ─── Job 2: Deploy ─────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script_stop: true
          script: |
            set -e

            echo "──────────────────────────────────"
            echo "🚀 Starting deployment: $(date)"
            echo "──────────────────────────────────"

            # ── Navigate to app directory ──
            cd /home/ubuntu/globxplore

            # ── Pull latest code ──
            echo "📦 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            # ── Install dependencies ──
            echo "📥 Installing dependencies..."
            npm ci --omit=dev

            # ── Run DB migrations (if applicable) ──
            # npm run migrate --if-present

            # ── Reload/start app with PM2 ──
            echo "🔄 Restarting application..."
            if pm2 list | grep -q "globx-crm"; then
              pm2 reload globx-crm --update-env
            else
              pm2 start src/server.js --name "globx-crm" \
                --max-memory-restart 300M \
                --restart-delay 3000
            fi

            pm2 save

            # ── Health check ──
            echo "🏥 Running health check..."
            sleep 5
            pm2 show globx-crm | grep -q "online" \
              && echo "✅ App is online" \
              || (echo "❌ App failed to start" && exit 1)

            echo "✅ Deployment complete: $(date)"

  # ─── Job 3: Notify ─────────────────────────────────────────────────
  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Notify Success
        if: needs.deploy.result == 'success'
        run: |
          echo "✅ Deployment succeeded!"
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"✅ globx-crm deployed successfully!"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Failure
        if: needs.deploy.result == 'failure'
        run: |
          echo "❌ Deployment failed!"
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"❌ globx-crm deployment FAILED!"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
